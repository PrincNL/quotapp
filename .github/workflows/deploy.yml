name: Deploy to Coolify

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_URL: https://quotapp.nl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production build
        run: npm run build

      - name: Trigger Coolify restart
        run: |
          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "https://admin.princhub.com/api/v1/applications/${{ secrets.COOLIFY_APP_UUID }}/restart"

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 20); do
            if curl --fail --silent "$APP_URL/api/health" >/dev/null; then
              echo "Healthcheck OK"
              exit 0
            fi
            echo "Waiting for deployment... ($attempt/20)"
            sleep 15
          done

          echo "Healthcheck failed after deployment"
          exit 1
